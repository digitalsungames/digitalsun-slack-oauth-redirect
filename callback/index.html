<!DOCTYPE html>
<html>
<head>
  <title>DigitalSun App - Slack Authorization</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 500px; margin: 80px auto; text-align: center; color: #333; }
    .info { background: #e8f4fd; border: 1px solid #b8daff; border-radius: 8px; padding: 16px; margin: 20px 0; }
    .code { font-size: 1.3em; font-weight: bold; user-select: all; background: #f0f0f0; padding: 12px; border-radius: 6px; word-break: break-all; }
    .error { color: #c00; }
  </style>
</head>
<body>
  <h2>DigitalSun App</h2>
  <p>Connecting to the DigitalSun App on your computer...</p>
  <div class="info">
    <p>&#x2139;&#xFE0F; If your browser asks to connect to a local device, click <strong>Allow</strong> — this is needed to send the authorization back to the app running on your computer.</p>
  </div>
  <p id="status">Attempting connection...</p>
  <script>
    var params = window.location.search;
    var ports = [53685, 53686, 53687];
    var currentIndex = 0;

    function tryNextPort() {
      if (currentIndex >= ports.length) {
        // All ports failed - show the code for manual copy
        var urlParams = new URLSearchParams(params);
        var code = urlParams.get('code');
        if (code) {
          document.getElementById('status').innerHTML =
            '<p class="error">Could not connect to the DigitalSun App automatically.</p>' +
            '<p>Please copy this code and paste it in the app:</p>' +
            '<div class="code">' + code + '</div>';
        } else {
          document.getElementById('status').innerHTML =
            '<p class="error">Authorization failed. No code received. Please try again from the app.</p>';
        }
        return;
      }

      var port = ports[currentIndex];
      var url = 'http://127.0.0.1:' + port + '/callback' + params;
      document.getElementById('status').textContent = 'Trying port ' + port + '...';

      fetch(url, { mode: 'no-cors', signal: AbortSignal.timeout(2000) })
        .then(function() { window.location.href = url; })
        .catch(function() {
          currentIndex++;
          tryNextPort();
        });
    }

    tryNextPort();
  </script>
</body>
</html>
