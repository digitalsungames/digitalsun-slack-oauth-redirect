<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>DigitalSun App - Autorización de Slack</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 500px; margin: 80px auto; text-align: center; color: #333; }
    .info { background: #e8f4fd; border: 1px solid #b8daff; border-radius: 8px; padding: 16px; margin: 20px 0; }
    .error { color: #c00; }
  </style>
</head>
<body>
  <h2>DigitalSun App</h2>
  <p>Conectando con la DigitalSun App en tu ordenador...</p>
  <div class="info">
    <p>Si el navegador te pide permisos adicionales, haz clic en <strong>Permitir</strong>.</p>
  </div>
  <p id="status">Intentando conexión...</p>
  <script>
    var params = window.location.search;
    var ports = [53685, 53686, 53687];

    // How many times to retry all ports before giving up.
    // Each full cycle takes up to ports.length * PER_PORT_TIMEOUT ms.
    // 6 cycles * 3 ports * 3s + 5 * 1s delay = ~59s max.
    // The first attempt uses a longer timeout to allow the user to respond
    // to a browser permission dialog (which blocks the fetch until dismissed).
    var MAX_CYCLES = 6;
    var PER_PORT_TIMEOUT = 3000;        // ms per port attempt (normal)
    var FIRST_ATTEMPT_TIMEOUT = 10000;  // ms for the very first attempt (browser permission dialog)
    var RETRY_DELAY = 1000;             // ms to wait between cycles

    var cycle = 0;
    var isFirstAttempt = true;

    function delay(ms) {
      return new Promise(function(resolve) { setTimeout(resolve, ms); });
    }

    function tryPort(port) {
      var timeout = isFirstAttempt ? FIRST_ATTEMPT_TIMEOUT : PER_PORT_TIMEOUT;
      isFirstAttempt = false;
      return fetch('http://localhost:' + port + '/callback/', {
        mode: 'no-cors',
        signal: AbortSignal.timeout(timeout)
      }).then(function() {
        // Port is alive - redirect with the full URL including code
        window.location.href = 'http://localhost:' + port + '/callback' + params;
        return true; // signal success
      }).catch(function() {
        return false; // signal failure
      });
    }

    async function tryCycle() {
      for (var i = 0; i < ports.length; i++) {
        var port = ports[i];
        document.getElementById('status').textContent =
          'Intentando conectar' + (cycle > 0 ? ' (intento ' + (cycle + 1) + ')' : '') + '...';

        var success = await tryPort(port);
        if (success) return; // redirect already triggered
      }

      cycle++;
      if (cycle < MAX_CYCLES) {
        await delay(RETRY_DELAY);
        await tryCycle();
      } else {
        document.getElementById('status').innerHTML =
          '<p class="error">No se ha podido conectar con la DigitalSun App automáticamente.</p>' +
          '<p>Cierra esta ventana, vuelve a abrir la DigitalSun App e inténtalo de nuevo.<br>' +
          'Si el problema persiste, contacta con tu administrador.</p>';
      }
    }

    tryCycle();
  </script>
</body>
</html>
