<!DOCTYPE html>
<html>
<head>
  <title>DigitalSun App - Slack Authorization</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 500px; margin: 80px auto; text-align: center; color: #333; }
    .info { background: #e8f4fd; border: 1px solid #b8daff; border-radius: 8px; padding: 16px; margin: 20px 0; }
    .success { background: #d4edda; border: 1px solid #c3e6cb; border-radius: 8px; padding: 16px; margin: 20px 0; color: #155724; }
    .error { background: #fdecea; border: 1px solid #f5c6cb; border-radius: 8px; padding: 16px; margin: 20px 0; color: #721c24; }
  </style>
</head>
<body>
  <h2>DigitalSun App</h2>
  <p>Connecting to the DigitalSun App on your computer...</p>
  <div class="info">
    <p>If your browser asks to open the DigitalSun App, click <strong>Allow</strong> or <strong>Open</strong>.</p>
  </div>
  <p id="status">Attempting connection...</p>
  <script>
    var params = window.location.search;
    var urlParams = new URLSearchParams(params);
    var code = urlParams.get('code');
    var error = urlParams.get('error');

    // If Slack returned an error (e.g. user denied), show it immediately
    if (error) {
      document.getElementById('status').innerHTML =
        '<div class="error">' +
        '<strong>Authorization failed.</strong><br>' +
        'Please try again from the DigitalSun App, or contact your administrator if the problem persists.' +
        '</div>';
    } else if (code) {
      // PRIMARY: Redirect via the custom URI scheme (digitalsunapp://).
      // New app versions (with URI scheme registered) receive the code this way —
      // no browser permissions or localhost access needed.
      document.getElementById('status').textContent = 'Opening DigitalSun App...';
      window.location.href = 'digitalsunapp://callback' + params;

      // After 1 second, show a success message — the URI scheme redirect has been
      // sent to the OS. If the new app handled it, auth is already complete.
      // If the user is on an older app version, the localhost fallback runs silently
      // in the background without showing any error to the user.
      setTimeout(function() {
        document.getElementById('status').innerHTML =
          '<div class="success">' +
          '<strong>Authentication successful!</strong><br>' +
          'You can close this window and return to the DigitalSun App.' +
          '</div>';

        // Silently try localhost ports for older app versions.
        // No error is shown if these fail — the new app already handled it above.
        tryNextPort();
      }, 1000);
    } else {
      document.getElementById('status').innerHTML =
        '<div class="error">' +
        '<strong>No authorization code received.</strong><br>' +
        'Please try again from the DigitalSun App, or contact your administrator if the problem persists.' +
        '</div>';
    }

    // --- Silent localhost fallback for older app versions ---
    // Older app versions (before the URI scheme update) listen on these ports.
    // New app versions ignore these requests (no listener running), which is harmless.
    // No error is shown to the user if these fail.
    var ports = [53685, 53686, 53687];
    var currentIndex = 0;

    function tryNextPort() {
      if (currentIndex >= ports.length) {
        // All ports failed — this is expected for new app versions. No error shown.
        return;
      }

      var port = ports[currentIndex];

      // Only check if port is alive - do NOT send the code in the fetch
      fetch('http://127.0.0.1:' + port + '/callback/', { mode: 'no-cors', signal: AbortSignal.timeout(2000) })
        .then(function() {
          // Port is alive (old app version) - redirect with the full URL including code
          window.location.href = 'http://127.0.0.1:' + port + '/callback' + params;
        })
        .catch(function() {
          currentIndex++;
          tryNextPort();
        });
    }
  </script>
</body>
</html>
